<<!DOCTYPE html>
<html>
<head>
  <title>HiveLaunch AI</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0b0b0d;
      background-image:
        radial-gradient(circle at top left, rgba(244,180,0,0.15), transparent 45%),
        radial-gradient(circle at bottom right, rgba(255,204,51,0.10), transparent 50%),
        url("https://www.transparenttextures.com/patterns/hexellence.png");
      color: white;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 40px 20px;
      text-align: center;
    }

    h1 {
      color: #f4b400;
    }

    input {
      width: 80%;
      padding: 12px;
      margin-top: 15px;
      border-radius: 10px;
      border: none;
    }

    button {
      margin-top: 10px;
      padding: 12px 20px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #f4b400, #ffcc33);
      font-weight: bold;
      cursor: pointer;
    }

    .result-card {
      margin-top: 20px;
      padding: 20px;
      border-radius: 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(244,180,0,0.15);
      text-align: left;
    }

    .content {
      white-space: pre-wrap;
      line-height: 1.6;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>🐝 HiveLaunch AI</h1>
  <p>Turn any idea into a business in seconds</p>

  <input id="idea" placeholder="Enter your business idea..." />
  <br>

  <button onclick="generateBusiness()">Generate Business</button>

  <div id="results" class="result-card">
    Results will appear here...
  </div>

</div>

<script src="app.js"></script>

</body>
</html>
