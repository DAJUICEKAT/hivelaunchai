<<!DOCTYPE html>
<html>
<head>
  <title>HiveLaunch AI</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0b0b0d;
      background-image:
        radial-gradient(circle at top left, rgba(244,180,0,0.15), transparent 45%),
        radial-gradient(circle at bottom right, rgba(255,204,51,0.10), transparent 50%),
        url("https://www.transparenttextures.com/patterns/hexellence.png");
      color: white;
    }
<div class="hive-brain">
  <svg viewBox="0 0 800 600" preserveAspectRatio="none">

    <!-- NODES -->
    <circle class="node" cx="120" cy="120" r="4"/>
    <circle class="node" cx="300" cy="180" r="4"/>
    <circle class="node" cx="500" cy="140" r="4"/>
    <circle class="node" cx="650" cy="220" r="4"/>
    <circle class="node" cx="200" cy="320" r="4"/>
    <circle class="node" cx="420" cy="340" r="4"/>
    <circle class="node" cx="600" cy="420" r="4"/>
    <circle class="node" cx="350" cy="500" r="4"/>
    <circle class="node" cx="100" cy="450" r="4"/>

    <!-- CONNECTIONS -->
    <line class="link" x1="120" y1="120" x2="300" y2="180"/>
    <line class="link" x1="300" y1="180" x2="500" y2="140"/>
    <line class="link" x1="500" y1="140" x2="650" y2="220"/>
    <line class="link" x1="300" y1="180" x2="200" y2="320"/>
    <line class="link" x1="200" y1="320" x2="420" y2="340"/>
    <line class="link" x1="420" y1="340" x2="600" y2="420"/>
    <line class="link" x1="420" y1="340" x2="350" y2="500"/>
    <line class="link" x1="200" y1="320" x2="100" y2="450"/>
    <line class="link" x1="650" y1="220" x2="420" y2="340"/>
  </svg>
</div>
    .container {
      max-width: 900px;
      margin: auto;
      padding: 40px 20px;
      text-align: center;
    }

    h1 {
      color: #f4b400;
    }

    input {
      width: 80%;
      padding: 12px;
      margin-top: 15px;
      border-radius: 10px;
      border: none;
    }

    button {
      margin-top: 10px;
      padding: 12px 20px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #f4b400, #ffcc33);
      font-weight: bold;
      cursor: pointer;
    }

    .result-card {
      margin-top: 20px;
      padding: 20px;
      border-radius: 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(244,180,0,0.15);
      text-align: left;
    }

    .content {
      white-space: pre-wrap;
      line-height: 1.6;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>🐝 HiveLaunch AI</h1>
  <p>Turn any idea into a business in seconds</p>

  <input id="idea" placeholder="Enter your business idea..." />
  <br>

  <button onclick="generateBusiness()">Generate Business</button>

  <div id="results" class="result-card">
    Results will appear here...
  </div>

</div>

<script src="app.js"></script>

</body>
</html>
